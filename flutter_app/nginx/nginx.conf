# Rate limiting zones (defined in http context via include)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 8080;
    server_name _;

    # Hide Nginx version from response headers
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options            "DENY"              always;
    add_header X-Content-Type-Options     "nosniff"           always;
    add_header X-XSS-Protection           "1; mode=block"     always;
    add_header Referrer-Policy            "strict-origin"     always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    # HSTS is added by the outer Nginx on VPS (after SSL termination)

    # ── Flutter Web SPA ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Prevent CDN/browser from caching main entry files (they change every build)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Only allow safe read methods on static assets
        limit_except GET HEAD {
            deny all;
        }
    }

    # ── Reverse Proxy → Go Wrapper API ───────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
        proxy_connect_timeout 10s;
    }

    # ── Extra Rate Limiting on Login ──────────────────────────────────────────
    location /api/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass         http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8081/health;
    }

    # ── Block hidden files (.git, .env, etc.) ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
