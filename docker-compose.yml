services:
  # ── Go Wrapper API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: swaap-backend:latest
    restart: unless-stopped
    environment:
      PORT: "8081"
    networks:
      - internal
    # Security hardening
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    # Never expose port 8081 to the host — Nginx proxies internally
    expose:
      - "8081"

  # ── Flutter Web Frontend (Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./flutter_app
      dockerfile: Dockerfile
    image: swaap-frontend:latest
    restart: unless-stopped
    networks:
      - internal
      - public
    cap_drop:
      - ALL
    read_only: true
    # nginx-unprivileged needs these tmpfs mounts to write its runtime files
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8080:8080"   # Only bind to localhost — host Nginx handles HTTPS
    depends_on:
      - backend

  # ── Cloudflare Tunnel ───────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiMTFlZWRjN2UwZThiOGM4NTA1MDAwYjY4MDZmZjc2ZmIiLCJ0IjoiMzZiZDJjYzEtZTViZC00OTVjLTg2NDEtMjUzZTEyNmIwNDhiIiwicyI6Ik5qZGpaV1V3WXprdE5XWTVZaTAwWXpVNUxXSmpaV1l0T1dJeE5EUTFZemxqWkRjMCJ9
    networks:
      - public

networks:
  internal:
  public:
    driver: bridge
