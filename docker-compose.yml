services:
  # ── Go Wrapper API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: swaap-backend:latest
    restart: unless-stopped
    environment:
      PORT: "8081"
    networks:
      - internal
    # Security hardening
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    # Never expose port 8081 to the host — Nginx proxies internally
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Flutter Web Frontend (Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./flutter_app
      dockerfile: Dockerfile
    image: swaap-frontend:latest
    restart: unless-stopped
    networks:
      - internal
      - public
    cap_drop:
      - ALL
    read_only: true
    # nginx-unprivileged needs these tmpfs mounts to write its runtime files
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8080:8080"   # Only bind to localhost — host Nginx handles HTTPS
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    internal: true   # backend is NOT reachable from the internet
  public:
    driver: bridge
